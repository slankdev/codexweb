name: PR preview deploy

# Deploy a per-PR Cloud Run service so reviewers can poke at the changes
# before merge. The service name is `codexweb-pr-<NUMBER>` and lives in
# the same Artifact Registry / project as production. No Cloud SQL is
# attached — previews use the in-memory task store (so chat history is
# scoped to the preview and disappears when the PR is closed).
#
# Auth is left on, but each new PR URL needs to be added once to the
# Google OAuth client's "Authorized redirect URIs" before login works.
# The workflow comments the redirect URI on the PR after the first
# deploy so it's a copy-paste away.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  id-token: write       # Workload Identity Federation
  pull-requests: write  # Bot comment on the PR

# Cancel an in-flight deploy if a new push to the PR arrives.
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    # Only deploy on open / synchronize / reopen, and only for branches
    # in the same repo. Forks would get rejected by WIF anyway, but
    # this short-circuits before we even try.
    if: >
      github.event.action != 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      AR_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO }}
      SERVICE: codexweb-pr-${{ github.event.pull_request.number }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate required variables
        run: |
          missing=()
          for v in GCP_PROJECT_ID GCP_REGION AR_REPO; do
            if [ -z "${!v}" ]; then missing+=("$v"); fi
          done
          if [ -z "${{ vars.WIF_PROVIDER }}" ]; then missing+=("WIF_PROVIDER"); fi
          if [ -z "${{ vars.WIF_SERVICE_ACCOUNT }}" ]; then missing+=("WIF_SERVICE_ACCOUNT"); fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required repo variables: ${missing[*]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: tag
        run: |
          short="${PR_HEAD_SHA::7}"
          image="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/${SERVICE}"
          echo "tag=${image}:${short}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy preview to Cloud Run
        run: |
          set -euo pipefail

          env_vars=("CODEXWEB_PREVIEW_PR=${PR_NUMBER}")
          [ -n "${{ vars.ALLOWED_EMAILS }}"      ] && env_vars+=("ALLOWED_EMAILS=${{ vars.ALLOWED_EMAILS }}")
          [ -n "${{ vars.OAUTH_AUTHORIZE_URL }}" ] && env_vars+=("OAUTH_AUTHORIZE_URL=${{ vars.OAUTH_AUTHORIZE_URL }}")
          [ -n "${{ vars.OAUTH_TOKEN_URL }}"     ] && env_vars+=("OAUTH_TOKEN_URL=${{ vars.OAUTH_TOKEN_URL }}")
          [ -n "${{ vars.OAUTH_USERINFO_URL }}"  ] && env_vars+=("OAUTH_USERINFO_URL=${{ vars.OAUTH_USERINFO_URL }}")
          [ -n "${{ vars.OAUTH_SCOPES }}"        ] && env_vars+=("OAUTH_SCOPES=${{ vars.OAUTH_SCOPES }}")
          [ -n "${{ vars.CODEX_DEFAULT_CWD }}"   ] && env_vars+=("CODEX_DEFAULT_CWD=${{ vars.CODEX_DEFAULT_CWD }}")
          [ -n "${{ vars.CODEX_EXTRA_ARGS }}"    ] && env_vars+=("CODEX_EXTRA_ARGS=${{ vars.CODEX_EXTRA_ARGS }}")
          # Deliberately NOT setting AUTH_BASE_URL — the app falls back
          # to X-Forwarded-* headers, which Cloud Run provides correctly,
          # so each preview's auto-assigned URL just works.
          env_joined=$(IFS=','; echo "${env_vars[*]}")

          secrets="AUTH_SECRET=AUTH_SECRET:latest"
          secrets+=",OAUTH_CLIENT_ID=OAUTH_CLIENT_ID:latest"
          secrets+=",OPENAI_API_KEY=OPENAI_API_KEY:latest"
          if [ "${{ vars.OAUTH_USE_CLIENT_SECRET }}" != "false" ]; then
            secrets+=",OAUTH_CLIENT_SECRET=OAUTH_CLIENT_SECRET:latest"
          fi

          gcloud run deploy "$SERVICE" \
            --image="${{ steps.tag.outputs.tag }}" \
            --region="$GCP_REGION" \
            --project="$GCP_PROJECT_ID" \
            --platform=managed \
            --allow-unauthenticated \
            --port=3000 \
            --cpu=1 \
            --memory=1Gi \
            --min-instances=0 \
            --max-instances=1 \
            --timeout=3600 \
            --execution-environment=gen2 \
            --set-secrets="$secrets" \
            --set-env-vars="$env_joined" \
            --labels=codexweb-preview=true,codexweb-pr="$PR_NUMBER" \
            --quiet

      - name: Get service URL
        id: url
        run: |
          url=$(gcloud run services describe "$SERVICE" \
            --region="$GCP_REGION" --project="$GCP_PROJECT_ID" \
            --format='value(status.url)')
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "::notice title=Preview::Deployed to $url"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.url.outputs.url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const sha = "${{ github.event.pull_request.head.sha }}".slice(0, 7);
            const marker = "<!-- codexweb-pr-preview -->";
            const body = [
              marker,
              "## :rocket: Preview deployed",
              "",
              `**URL**: ${url}`,
              `**Commit**: \`${sha}\``,
              "",
              "### 初回ログインの準備",
              "",
              "Google Cloud Console → APIs & Services → Credentials → OAuth client → **Authorized redirect URIs** に下記を追加して **Save** してください。",
              "",
              "```",
              `${url}/api/auth/callback`,
              "```",
              "",
              "PR をクローズすると preview は自動削除されます (Chat 履歴はインメモリなのでデプロイのたびに失われます)。",
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      SERVICE: codexweb-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete Cloud Run service
        run: |
          if gcloud run services describe "$SERVICE" \
                --region="$GCP_REGION" --project="$GCP_PROJECT_ID" \
                >/dev/null 2>&1; then
            gcloud run services delete "$SERVICE" \
              --region="$GCP_REGION" --project="$GCP_PROJECT_ID" --quiet
            echo "Deleted $SERVICE."
          else
            echo "Service $SERVICE not found — nothing to delete."
          fi

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- codexweb-pr-preview -->";
            const body = [
              marker,
              "## :broom: Preview deleted",
              "",
              `Cloud Run service \`codexweb-pr-${{ github.event.pull_request.number }}\` は削除済みです。`,
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
